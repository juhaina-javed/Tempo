<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempo — Lyric People Sidekick</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Lyric Brand Colors */
    --lyric-blue: #2424F5;
    --lyric-blue-dark: #1a1ab8;
    --lyric-blue-light: #EEEEFF;
    --lyric-red: #FE3519;
    --lyric-green: #00EF6B;
    --lyric-yellow: #F6EE19;
    --lyric-orange: #FE6007;

    /* UI tokens */
    --bg: #F5F5F3;
    --surface: #FFFFFF;
    --surface2: #EDEDEB;
    --border: rgba(0,0,0,0.07);
    --border-med: rgba(0,0,0,0.12);
    --text: #0A0A0A;
    --text-2: #555550;
    --text-3: #999994;
    --accent: var(--lyric-blue);
    --accent-light: var(--lyric-blue-light);
    --green: #1A8A4A;
    --green-light: #E6F9EE;
    --red: #C0392B;
    --red-light: #FDECEA;
    --chat-bot-bg: #FFFFFF;
    --chat-user-bg: var(--lyric-blue);
    --chat-user-text: #FFFFFF;
    --radius: 12px;
    --radius-sm: 6px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 20px rgba(0,0,0,0.03);
    --shadow-lg: 0 4px 32px rgba(36,36,245,0.08);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    -webkit-font-smoothing: antialiased;
  }

  /* Mono utility — JetBrains Mono, always uppercase */
  .mono {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 760px;
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-mark {
    width: 38px;
    height: 38px;
    background: var(--lyric-blue);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(36,36,245,0.25);
  }

  .logo-mark svg { width: 18px; height: 18px; }

  .logo-text {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text);
  }

  .logo-tag {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 10px;
    color: var(--text-3);
    font-weight: 500;
    letter-spacing: 0.1em;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--green-light);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 5px 12px;
    border-radius: 20px;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Chat container ── */
  .chat-wrap {
    width: 100%;
    max-width: 760px;
    padding: 20px 24px 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .chat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 180px);
    min-height: 500px;
    overflow: hidden;
  }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border-med); border-radius: 2px; }

  .msg-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }

  .avatar.bot {
    background: var(--lyric-blue);
    color: #fff;
  }

  .avatar.user-av {
    background: var(--surface2);
    color: var(--text-2);
  }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    font-size: 14.5px;
    line-height: 1.7;
    border-radius: 14px;
    letter-spacing: -0.01em;
  }

  .bubble.bot {
    background: var(--chat-bot-bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .bubble.user {
    background: var(--chat-user-bg);
    color: var(--chat-user-text);
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 8px rgba(36,36,245,0.2);
  }

  .bubble a { color: var(--lyric-blue); text-decoration: underline; text-underline-offset: 2px; }
  .bubble.user a { color: #fff; }
  .bubble.bot strong { font-weight: 600; }

  /* feedback */
  .feedback-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    margin-left: 38px;
    animation: msg-in 0.3s ease-out 0.1s both;
  }

  .fb-btn {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: transparent;
    cursor: pointer;
    color: var(--text-2);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .fb-btn:hover { background: var(--surface2); color: var(--text); }
  .fb-btn.good:hover { background: var(--green-light); color: var(--green); border-color: var(--green); }
  .fb-btn.bad:hover  { background: var(--red-light); color: var(--red); border-color: var(--red); }

  /* typing */
  .typing-bubble {
    background: var(--chat-bot-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-bubble span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--lyric-blue);
    opacity: 0.4;
    animation: blink 1.3s infinite;
  }

  .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
  .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  /* ── Input bar ── */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
  }

  #user-input {
    flex: 1;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 14.5px;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    resize: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    overflow-y: auto;
  }

  #user-input::placeholder { color: var(--text-3); }
  #user-input:focus { border-color: var(--lyric-blue); background: #fff; box-shadow: 0 0 0 3px rgba(36,36,245,0.08); }

  #send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--lyric-blue);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    box-shadow: 0 2px 8px rgba(36,36,245,0.25);
  }

  #send-btn:hover { background: var(--lyric-blue-dark); box-shadow: 0 4px 12px rgba(36,36,245,0.35); }
  #send-btn:active { transform: scale(0.93); }
  #send-btn:disabled { background: var(--border-med); cursor: not-allowed; box-shadow: none; }
  #send-btn svg { width: 16px; height: 16px; }

  /* ── Footer ── */
  footer {
    width: 100%;
    max-width: 760px;
    padding: 12px 24px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-note {
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-3);
  }

  .footer-note a {
    color: var(--text-2);
    text-decoration: none;
  }

  .footer-note a:hover { text-decoration: underline; color: var(--lyric-blue); }

  /* ── Suggested questions ── */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 0 24px 12px;
    animation: msg-in 0.3s ease-out;
  }

  .suggestion-chip {
    font-size: 12px;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: var(--accent-light);
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }

  .suggestion-chip:hover {
    background: var(--lyric-blue);
    color: #fff;
    border-color: var(--lyric-blue);
    box-shadow: 0 2px 8px rgba(36,36,245,0.2);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header, .chat-wrap, footer { padding-left: 14px; padding-right: 14px; }
    .bubble { max-width: 85%; }
    .chat-box { height: calc(100vh - 160px); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="9" cy="9" r="3.5" fill="white"/>
        <path d="M9 2V4M9 14V16M2 9H4M14 9H16M4.22 4.22L5.64 5.64M12.36 12.36L13.78 13.78M13.78 4.22L12.36 5.64M5.64 12.36L4.22 13.78" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Tempo</div>
      <div class="logo-tag">People Sidekick</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-pill">
      <span class="status-dot"></span>
      Online
    </div>
  </div>
</header>

<div class="chat-wrap">
  <div class="chat-box">
    <div id="messages"></div>
    <div id="suggestions" class="suggestions" style="display:none"></div>
    <div class="input-bar">
      <textarea id="user-input" placeholder="Ask Tempo anything about Lyric…" rows="1"></textarea>
      <button id="send-btn" aria-label="Send">
        <svg viewBox="0 0 16 16" fill="none">
          <path d="M13.5 2.5L7 9M13.5 2.5L9 13.5L7 9M13.5 2.5L2.5 6.5L7 9" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<footer>
  <span class="footer-note">Questions? <a href="/cdn-cgi/l/email-protection#2050454f504c45604c595249430e54454348"><span class="__cf_email__" data-cfemail="cebeaba1bea2ab8ea2b7bca7ade0baabada6">[email&#160;protected]</span></a></span>
  <span class="footer-note">Powered by Lyric People Ops</span>
</footer>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const SUGGESTIONS = [
  "When will I get my laptop?",
  "Who handles payroll questions?",
  "What time does my first day start?",
  "How do I enroll in benefits?",
  "How do I access Slack and Notion?"
];

let history = [];
let msgCount = 0;
let lastBotReply = '';

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const suggestionsEl = document.getElementById('suggestions');

function init() {
  addBotMessage("Hi there! I'm Tempo, your People sidekick at Lyric. 👋\n\nI help you stay in tune from before day one and beyond — whether it's pre-boarding questions, company policies, benefits, payroll, or anything else People-related.\n\nWhat's on your mind?");
  showSuggestions();
}

function showSuggestions() {
  suggestionsEl.style.display = 'flex';
  suggestionsEl.innerHTML = SUGGESTIONS.map(s =>
    `<button class="suggestion-chip" onclick="useSuggestion('${s.replace(/'/g,"\\\'")}')">${s}</button>`
  ).join('');
}

function hideSuggestions() {
  suggestionsEl.style.display = 'none';
}

function useSuggestion(text) {
  hideSuggestions();
  inputEl.value = text;
  sendMessage();
}

function addBotMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = 'T';
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = formatText(text);
  row.appendChild(av);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scroll();
  return row;
}

function addUserMessage(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const av = document.createElement('div');
  av.className = 'avatar user-av';
  av.textContent = 'You';
  const bubble = document.createElement('div');
  bubble.className = 'bubble user';
  bubble.textContent = text;
  row.appendChild(av);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scroll();
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  const av = document.createElement('div');
  av.className = 'avatar bot';
  av.textContent = 'T';
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(av);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scroll();
}

function removeTyping() {
  const t = document.getElementById('typing-row');
  if (t) t.remove();
}

function addFeedback(userQ, botReply) {
  const row = document.createElement('div');
  row.className = 'feedback-row';
  row.dataset.question = userQ;
  row.dataset.answer = botReply;
  row.innerHTML = `
    <button class="fb-btn good" onclick="feedback(this,'helpful')">👍 Helpful</button>
    <button class="fb-btn bad"  onclick="feedback(this,'unhelpful')">👎 Not helpful</button>
  `;
  messagesEl.appendChild(row);
  scroll();
}

function feedback(btn, type) {
  const row = btn.closest('.feedback-row');
  const q = row.dataset.question || '';
  const a = row.dataset.answer || '';
  logFeedback(q, type, a);
  if (type === 'helpful') {
    row.innerHTML = '<span style="font-size:11px;color:var(--text-3);font-family:JetBrains Mono,monospace;text-transform:uppercase;letter-spacing:0.04em">Thanks — glad that helped!</span>';
  } else {
    row.innerHTML = '<span style="font-size:11px;color:var(--text-3)">Sorry about that! Email <a href="mailto:people@lyric.tech" style="color:var(--lyric-blue)">people@lyric.tech</a> and we\'ll circle back to you.</span>';
  }
  scroll();
}

function formatText(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

function scroll() {
  setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 30);
}

async function logFeedback(question, type, answer) {
  try {
    await fetch('/api/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, type, answer: answer || '', ts: new Date().toISOString() })
    });
  } catch(e) {}
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  inputEl.style.height = '';
  sendBtn.disabled = true;
  hideSuggestions();
  addUserMessage(text);
  history.push({ role: 'user', content: text });
  addTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ history })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.reply || "I'm having trouble right now. Please email people@lyric.tech and we'll get back to you!";
    history.push({ role: 'assistant', content: reply });
    addBotMessage(reply);
    lastBotReply = reply;
    msgCount++;
    if (msgCount % 4 === 0) showSuggestions();
    logFeedback(text, 'asked', reply);
    addFeedback(text, reply);
  } catch(e) {
    removeTyping();
    addBotMessage("Something went wrong on my end. Please email **people@lyric.tech** and we'll help you directly.");
  }
  sendBtn.disabled = false;
}

// Auto-resize textarea
inputEl.addEventListener('input', function() {
  this.style.height = 'auto
